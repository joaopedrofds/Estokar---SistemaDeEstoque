<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<div class="page-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="page-title">
                    <i class="bi bi-shield-lock-fill me-3"></i>
                    Perfis de Acesso
                </h1>
                <p class="page-subtitle">Cadastre os papéis e delegue permissões por perfil.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="/acesso/permissoes" class="btn btn-outline-light btn-lg">
                    <i class="bi bi-grid-3x3-gap-fill me-2"></i>
                    Matriz de Permissões
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="bi bi-pencil-square me-2"></i>
                        <span th:text="${perfilForm.id == 0 ? 'Novo Perfil' : 'Editar Perfil'}"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/acesso/perfis/salvar}" th:object="${perfilForm}" method="post">
                        <input type="hidden" name="id" th:value="${perfilForm.id}">

                        <div class="mb-3">
                            <label class="form-label" for="nome">Nome do Perfil</label>
                            <input id="nome" type="text" class="form-control" name="nome"
                                   th:value="${perfilForm.nome}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="descricao">Descrição</label>
                            <textarea id="descricao" class="form-control" rows="3"
                                      name="descricao" th:text="${perfilForm.descricao}"></textarea>
                        </div>

                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="ativo" name="ativo"
                                   th:checked="${perfilForm.ativo}">
                            <label class="form-check-label" for="ativo">Perfil ativo</label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/acesso/perfis" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-counterclockwise me-1"></i>Limpar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Salvar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="bi bi-list-ul me-2"></i>
                        Perfis cadastrados
                    </h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover modern-table mb-0">
                            <thead>
                            <tr>
                                <th>Perfil</th>
                                <th>Descrição</th>
                                <th>Status</th>
                                <th class="text-center">Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${perfis.empty}">
                                <td colspan="4" class="text-center py-4 text-muted">
                                    Nenhum perfil cadastrado.
                                </td>
                            </tr>
                            <tr th:each="perfil : ${perfis}">
                                <td class="fw-semibold" th:text="${perfil.nome}"></td>
                                <td th:text="${perfil.descricao}"></td>
                                <td>
                                        <span th:if="${perfil.ativo}" class="status-badge status-active">
                                            <i class="bi bi-check-circle-fill me-1"></i>Ativo
                                        </span>
                                    <span th:unless="${perfil.ativo}" class="status-badge status-inactive">
                                            <i class="bi bi-x-circle-fill me-1"></i>Inativo
                                        </span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/acesso/perfis(editarId=${perfil.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/acesso/permissoes(perfilId=${perfil.id})}" class="btn btn-sm btn-outline-info">
                                        <i class="bi bi-sliders"></i>
                                    </a>
                                    <a th:if="${perfil.ativo}" th:href="@{/acesso/perfis/inativar/{id}(id=${perfil.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Deseja inativar este perfil?')">
                                        <i class="bi bi-person-x"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
