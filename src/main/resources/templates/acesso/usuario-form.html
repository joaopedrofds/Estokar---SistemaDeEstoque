<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<div class="page-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="page-title">
                    <i class="bi bi-person-lines-fill me-3"></i>
                    <span th:text="${novoCadastro ? 'Cadastrar Usuário' : 'Editar Usuário'}"></span>
                </h1>
                <p class="page-subtitle">Defina credenciais, status e perfis de acesso.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="/acesso/usuarios" class="btn btn-outline-light btn-lg">
                    <i class="bi bi-arrow-left me-2"></i>
                    Voltar
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/acesso/usuarios/salvar}" th:object="${usuario}" method="post">
                <input type="hidden" name="id" th:value="${usuario.id}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="username">Login</label>
                        <input id="username" type="text" class="form-control"
                               name="username" th:value="${usuario.username}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="nome">Nome completo</label>
                        <input id="nome" type="text" class="form-control"
                               name="nome" th:value="${usuario.nome}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="novaSenha">
                            <span th:text="${novoCadastro ? 'Senha' : 'Nova senha (opcional)'}"></span>
                        </label>
                        <input id="novaSenha" type="password" class="form-control" name="novaSenha"
                               th:required="${novoCadastro}">
                        <div class="form-text" th:unless="${novoCadastro}">
                            Preencha somente se desejar alterar a senha.
                        </div>
                    </div>

                    <div class="col-md-6 d-flex align-items-end">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="ativo" name="ativo"
                                   th:checked="${usuario.ativo}">
                            <label class="form-check-label" for="ativo">Usuário ativo</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Perfis vinculados</label>
                        <div class="row g-2">
                            <div class="col-md-4" th:each="perfil : ${perfis}">
                                <div class="border rounded p-2 h-100">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox"
                                               name="perfilIds"
                                               th:id="${'perfil_' + perfil.id}"
                                               th:value="${perfil.id}"
                                               th:checked="${usuario.perfilIds.contains(perfil.id)}">
                                        <label class="form-check-label" th:for="${'perfil_' + perfil.id}">
                                            <strong th:text="${perfil.nome}"></strong>
                                        </label>
                                    </div>
                                    <small class="text-muted" th:text="${perfil.descricao}"></small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/acesso/usuarios" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle me-2"></i>Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>Salvar usuário
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
