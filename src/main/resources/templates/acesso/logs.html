<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<div class="page-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="page-title">
                    <i class="bi bi-journal-text me-3"></i>
                    Log de Acessos
                </h1>
                <p class="page-subtitle">Auditoria de tentativas permitidas e negadas.</p>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <form method="get" action="/acesso/logs" class="row g-3 mb-4">
        <div class="col-md-3">
            <label class="form-label">Resultado</label>
            <select name="resultado" class="form-select">
                <option value="">Todos</option>
                <option value="PERMITIDO" th:selected="${filtroResultado == 'PERMITIDO'}">Permitido</option>
                <option value="NEGADO" th:selected="${filtroResultado == 'NEGADO'}">Negado</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Limite</label>
            <input type="number" min="10" max="1000" step="10"
                   class="form-control" name="limite" th:value="${limite}">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-funnel me-2"></i>Filtrar
            </button>
        </div>
    </form>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover modern-table mb-0">
                    <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Usuário</th>
                        <th>Recurso</th>
                        <th>Operação</th>
                        <th>Resultado</th>
                        <th>Detalhe</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${logs.empty}">
                        <td colspan="6" class="text-center py-4 text-muted">
                            Nenhum registro encontrado.
                        </td>
                    </tr>
                    <tr th:each="log : ${logs}">
                        <td th:text="${#dates.format(log.dataHora, 'dd/MM/yyyy HH:mm:ss')}"></td>
                        <td>
                            <code th:text="${log.username}"></code>
                        </td>
                        <td th:text="${log.recurso}"></td>
                        <td th:text="${log.operacao}"></td>
                        <td>
                                <span th:if="${log.resultado == 'PERMITIDO'}" class="status-badge status-active">
                                    <i class="bi bi-check-circle-fill me-1"></i>Permitido
                                </span>
                            <span th:if="${log.resultado == 'NEGADO'}" class="status-badge status-inactive">
                                    <i class="bi bi-x-circle-fill me-1"></i>Negado
                                </span>
                        </td>
                        <td>
                            <small class="text-muted" th:text="${log.detalhe}"></small>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
