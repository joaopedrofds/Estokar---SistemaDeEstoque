<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="layout :: head"></head><body>
<div th:replace="layout :: menu"></div>
<div class="page-header"><div class="container"><h1 class="page-title"><i class="bi bi-person-heart me-3"></i>Ações de Retenção</h1><p class="page-subtitle">Cupons exclusivos para clientes Em Risco ou Inativo.</p></div></div>
<div class="container py-4"><div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div><div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>
<div class="row g-4"><div class="col-lg-4"><div class="card"><div class="card-header"><h5 class="mb-0">Gerar Cupom</h5></div><div class="card-body"><form th:action="@{/engajamento/retencao}" method="post">
<div class="mb-3"><label class="form-label" for="clienteId">Cliente elegível</label><select id="clienteId" name="clienteId" class="form-select" required><option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome + ' - ' + c.faixaFidelidade.nome}"></option></select></div>
<div class="mb-3"><label class="form-label" for="percentual">Desconto</label><input id="percentual" name="percentual" type="number" min="0.01" max="100" step="0.01" class="form-control" required></div>
<div class="mb-3"><label class="form-label" for="validade">Validade</label><input id="validade" name="validade" type="date" class="form-control" required></div><button class="btn btn-primary w-100" type="submit">Gerar</button></form></div></div></div>
<div class="col-lg-8"><div class="card"><div class="card-body p-0"><table class="table modern-table mb-0"><thead><tr><th>Cliente</th><th>Cupom</th><th>Desconto</th><th>Validade</th><th>Status</th><th></th></tr></thead><tbody><tr th:each="a : ${acoes}"><td th:text="${a.cliente.nome}"></td><td><code th:text="${a.codigoCupom}"></code></td><td th:text="${a.percentualDesconto + '%'}"></td><td th:text="${a.dataValidade}"></td><td><span class="badge" th:classappend="${a.ativa} ? ' bg-success' : ' bg-secondary'" th:text="${a.ativa ? 'Ativa' : 'Encerrada'}"></span></td><td><form th:if="${a.ativa}" th:action="@{/engajamento/retencao/{id}/encerrar(id=${a.id})}" method="post"><button class="btn btn-sm btn-outline-danger" type="submit" title="Encerrar"><i class="bi bi-x-circle"></i></button></form></td></tr></tbody></table></div></div></div></div></div>
<div th:replace="layout :: footer"></div><div th:replace="layout :: scripts"></div></body></html>
