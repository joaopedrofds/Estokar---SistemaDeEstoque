<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
    <div th:replace="layout :: menu"></div>

    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="page-title">
                        <i class="bi bi-clipboard-plus-fill me-3"></i>
                        Nova Sessão de Inventário
                    </h1>
                    <p class="page-subtitle">Abertura controlada por setor com gerente responsável</p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="/inventarios" class="btn btn-primary btn-lg">
                        <i class="bi bi-arrow-left-circle me-2"></i>
                        Inventários
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

        <div class="card">
            <div class="card-body">
                <form action="/inventarios/abrir" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Setor</label>
                            <input type="text" name="setor" class="form-control" maxlength="80" required
                                   placeholder="Ex.: Estoque Central">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Tolerância atual</label>
                            <input type="text" class="form-control" th:value="${tolerancia + ' unidades'}" disabled>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <div class="form-check form-switch mb-2">
                                <input class="form-check-input" type="checkbox" name="bloqueiaSaidas" value="true" id="bloqueiaSaidas">
                                <label class="form-check-label" for="bloqueiaSaidas">Bloquear saídas</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-play-circle me-2"></i>
                            Abrir Sessão
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
