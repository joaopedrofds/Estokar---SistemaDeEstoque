<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
    <div th:replace="layout :: menu"></div>

    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="page-title">
                        <i class="bi bi-clipboard-data-fill me-3"></i>
                        Sessão de Inventário
                    </h1>
                    <p class="page-subtitle">
                        <span th:text="${detalhe.sessao.setor}">Setor</span>
                        <span class="ms-2 text-muted">#</span><span th:text="${detalhe.sessao.id}"></span>
                    </p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="/inventarios" class="btn btn-primary btn-lg">
                        <i class="bi bi-arrow-left-circle me-2"></i>
                        Inventários
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>
        <div th:if="${mensagemAviso}" class="alert alert-warning" th:text="${mensagemAviso}"></div>
        <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="text-muted small">Status</div>
                        <div class="fw-bold" th:text="${detalhe.sessao.status}">EM_ANDAMENTO</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="text-muted small">Gerente</div>
                        <div class="fw-bold" th:text="${detalhe.sessao.gerenteNome}">Gerente</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="text-muted small">Tolerância</div>
                        <div class="fw-bold"><span th:text="${detalhe.sessao.toleranciaQuantidade}">3</span> unidades</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="text-muted small">Aprovador</div>
                        <div class="fw-bold" th:text="${detalhe.sessao.aprovadorNome != null ? detalhe.sessao.aprovadorNome : 'Sem aprovação'}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4" th:if="${detalhe.sessao.status == 'EM_ANDAMENTO'}">
            <div class="card-body">
                <form th:action="@{/inventarios/{id}/contagens(id=${detalhe.sessao.id})}" method="post">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-6">
                            <label class="form-label">Produto</label>
                            <select name="produtoId" class="form-select" required>
                                <option value="">Selecione</option>
                                <option th:each="produto : ${produtos}" th:value="${produto.id}" th:text="${produto.nome}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Quantidade física</label>
                            <input type="number" name="quantidadeFisica" class="form-control" min="0" required>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-plus-circle me-2"></i>
                                Registrar
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover modern-table mb-0">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Sistema</th>
                                <th>Físico</th>
                                <th>Diferença</th>
                                <th>Último operador</th>
                                <th>Última contagem</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${detalhe.itens}">
                                <td th:text="${item.produtoNome}"></td>
                                <td th:text="${item.quantidadeSistema}"></td>
                                <td>
                                    <span th:if="${item.contado}" th:text="${item.quantidadeFisica}"></span>
                                    <span th:if="${!item.contado}" class="badge bg-secondary">Pendente</span>
                                </td>
                                <td>
                                    <span th:if="${item.contado}" th:text="${item.diferenca}"
                                          th:classappend="${item.diferenca > detalhe.sessao.toleranciaQuantidade || item.diferenca < -detalhe.sessao.toleranciaQuantidade ? ' text-danger fw-bold' : ' text-success'}"></span>
                                    <span th:if="${!item.contado}">-</span>
                                </td>
                                <td th:text="${item.auxiliarNome != null ? item.auxiliarNome : '-'}"></td>
                                <td th:text="${item.dataContagem != null ? #dates.format(item.dataContagem, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end mb-4" th:if="${detalhe.sessao.status != 'FECHADO'}">
            <form th:action="@{/inventarios/{id}/fechar(id=${detalhe.sessao.id})}" method="post">
                <button type="submit" class="btn btn-warning btn-lg">
                    <i class="bi bi-check2-circle me-2"></i>
                    Fechar / Aprovar
                </button>
            </form>
        </div>

        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0">Histórico de Recontagens</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover modern-table mb-0">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Quantidade</th>
                                <th>Operador</th>
                                <th>Data</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${detalhe.historico.empty}">
                                <td colspan="4" class="text-center text-muted py-4">Nenhuma contagem registrada</td>
                            </tr>
                            <tr th:each="contagem : ${detalhe.historico}">
                                <td th:text="${contagem.produto != null ? contagem.produto.nome : 'Produto #' + contagem.produtoId}"></td>
                                <td th:text="${contagem.quantidadeFisica}"></td>
                                <td th:text="${contagem.auxiliarNome}"></td>
                                <td th:text="${#dates.format(contagem.dataContagem, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
