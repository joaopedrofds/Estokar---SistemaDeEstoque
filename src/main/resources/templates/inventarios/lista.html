<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
    <div th:replace="layout :: menu"></div>

    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="page-title">
                        <i class="bi bi-clipboard-data-fill me-3"></i>
                        Inventário Periódico
                    </h1>
                    <p class="page-subtitle">Sessões de contagem, recontagem e ajuste inteligente de diferenças</p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="/inventarios/novo" class="btn btn-primary btn-lg">
                        <i class="bi bi-plus-circle me-2"></i>
                        Nova Sessão
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>
        <div th:if="${mensagemAviso}" class="alert alert-warning" th:text="${mensagemAviso}"></div>
        <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="text-muted small">Em andamento</div>
                        <div class="display-6 fw-bold" th:text="${emAndamento}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="text-muted small">Aguardando aprovação</div>
                        <div class="display-6 fw-bold" th:text="${aguardando}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="text-muted small">Tolerância parametrizada</div>
                        <div class="display-6 fw-bold" th:text="${tolerancia}">3</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" th:if="${sessoes.empty}">
            <div class="card-body text-center py-5">
                <i class="bi bi-clipboard-x display-4 text-muted"></i>
                <h3 class="mt-3">Nenhuma sessão registrada</h3>
            </div>
        </div>

        <div class="card" th:if="${!sessoes.empty}">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover modern-table mb-0">
                        <thead>
                            <tr>
                                <th>Sessão</th>
                                <th>Setor</th>
                                <th>Status</th>
                                <th>Gerente</th>
                                <th>Abertura</th>
                                <th>Fechamento</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="sessao : ${sessoes}">
                                <td><span class="text-muted small">#</span><span th:text="${sessao.id}"></span></td>
                                <td th:text="${sessao.setor}"></td>
                                <td>
                                    <span class="badge bg-primary" th:if="${sessao.status == 'EM_ANDAMENTO'}">Em andamento</span>
                                    <span class="badge bg-warning text-dark" th:if="${sessao.status == 'AGUARDANDO_APROVACAO'}">Aguardando aprovação</span>
                                    <span class="badge bg-success" th:if="${sessao.status == 'FECHADO'}">Fechado</span>
                                </td>
                                <td th:text="${sessao.gerenteNome}"></td>
                                <td th:text="${sessao.dataAbertura != null ? #dates.format(sessao.dataAbertura, 'dd/MM/yyyy') : '-'}"></td>
                                <td th:text="${sessao.dataFechamento != null ? #dates.format(sessao.dataFechamento, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                                <td>
                                    <div class="action-buttons justify-content-center">
                                        <a th:href="@{/inventarios/{id}(id=${sessao.id})}"
                                           class="btn btn-sm btn-outline-info" title="Abrir sessão">
                                            <i class="bi bi-search"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
