<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<nav th:replace="layout :: menu"></nav>

<main class="container mt-4">
    <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <section class="mb-4">
        <h1 class="h3 mb-3">Cobranças</h1>
        <form th:action="@{/cobrancas/politicas}" th:object="${politica}" method="post" class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="nome">Política de crédito</label>
                <input id="nome" class="form-control" th:field="*{nome}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="diasLimiteAtraso">Dias limite</label>
                <input id="diasLimiteAtraso" type="number" min="0" class="form-control" th:field="*{diasLimiteAtraso}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="dataInicio">Início</label>
                <input id="dataInicio" type="date" class="form-control" th:field="*{dataInicio}">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Ativar política</button>
            </div>
        </form>
    </section>

    <section class="mb-4">
        <h2 class="h4 mb-3">Registrar contato</h2>
        <form th:action="@{/cobrancas/historicos}" th:object="${historico}" method="post" class="row g-3">
            <div class="col-md-2">
                <label class="form-label" for="clienteId">Cliente ID</label>
                <input id="clienteId" type="number" min="1" class="form-control" th:field="*{clienteId}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="tipo">Tipo</label>
                <input id="tipo" class="form-control" th:field="*{tipo}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="usuario">Usuário</label>
                <input id="usuario" class="form-control" th:field="*{usuario}" required>
            </div>
            <div class="col-12">
                <label class="form-label" for="descricao">Descrição</label>
                <textarea id="descricao" class="form-control" rows="3" th:field="*{descricao}" required></textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Registrar</button>
            </div>
        </form>
    </section>

    <section>
        <h2 class="h4 mb-3">Corrigir histórico</h2>
        <form th:action="@{/cobrancas/historicos/correcao}" th:object="${historico}" method="post" class="row g-3">
            <div class="col-md-2">
                <label class="form-label" for="registroOriginalId">Registro original</label>
                <input id="registroOriginalId" type="number" min="1" class="form-control" th:field="*{registroOriginalId}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label" for="clienteCorrecaoId">Cliente ID</label>
                <input id="clienteCorrecaoId" type="number" min="1" class="form-control" th:field="*{clienteId}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="usuarioCorrecao">Usuário</label>
                <input id="usuarioCorrecao" class="form-control" th:field="*{usuario}" required>
            </div>
            <div class="col-12">
                <label class="form-label" for="descricaoCorrecao">Correção</label>
                <textarea id="descricaoCorrecao" class="form-control" rows="3" th:field="*{descricao}" required></textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-outline-primary">Criar correção</button>
            </div>
        </form>
    </section>
</main>

<div th:replace="layout :: scripts"></div>
</body>
</html>
