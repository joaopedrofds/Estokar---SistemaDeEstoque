<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="layout :: head"></head><body><nav th:replace="layout :: menu"></nav><main class="container py-4"><div class="page-header"><h1 class="page-title">Histórico de cotações</h1><p class="page-subtitle">Auditoria completa das consultas externas e de contingência.</p></div><div class="card"><div class="table-responsive"><table class="table modern-table"><thead><tr><th>Data</th><th>Usuário</th><th>Pedido/cliente</th><th>CEP</th><th>Peso</th><th>Dimensões</th><th>Origem</th><th>Valor</th></tr></thead><tbody><tr th:each="c:${cotacoes}"><td th:text="${#temporals.format(c.dataCotacao,'dd/MM/yyyy HH:mm')}"></td><td th:text="${c.usuarioId}"></td><td><span th:if="${c.pedido}" th:text="'Pedido #'+${c.pedido.id}"></span><span th:if="${c.cliente}" th:text="' · '+${c.cliente.nome}"></span></td><td th:text="${c.cepDestino}"></td><td th:text="${c.peso}+' kg'"></td><td th:text="${c.comprimento}+'×'+${c.largura}+'×'+${c.altura}"></td><td><span class="badge" th:classappend="${c.origemResultado=='API'?'bg-success':(c.origemResultado=='CACHE'?'bg-secondary':'bg-danger')}" th:text="${c.origemResultado}"></span></td><td th:text="'R$ '+${c.valorCotado}"></td></tr><tr th:if="${#lists.isEmpty(cotacoes)}"><td colspan="8" class="text-center text-muted">Nenhuma cotação registrada.</td></tr></tbody></table></div></div></main><footer th:replace="layout :: footer"></footer><div th:replace="layout :: scripts"></div></body></html>
