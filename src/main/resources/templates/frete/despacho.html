<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="layout :: head"></head><body><nav th:replace="layout :: menu"></nav><main class="container py-4"><div class="page-header"><h1 class="page-title">Gerar ordem de despacho</h1><p class="page-subtitle">A autorização verifica inadimplência e faixa de fidelidade antes da gravação.</p></div><div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div><div class="card p-4"><form method="post" th:action="@{/frete/despacho}"><div class="row g-3"><div class="col-md-4"><label class="form-label">Pedido</label><select name="pedidoId" class="form-select" required><option value="">Selecione</option><option th:each="p:${pedidos}" th:value="${p.id}" th:text="'Pedido #'+${p.id}+' — '+${p.cliente.nome}"></option></select></div><div class="col-md-4"><label class="form-label">Cotação</label><select name="logCotacaoId" class="form-select" required><option value="">Selecione</option><option th:each="c:${cotacoes}" th:value="${c.id}" th:text="'#'+${c.id}+' · '+${c.cepDestino}+' · R$ '+${c.valorCotado}+' ('+${c.origemResultado}+')'"></option></select></div><div class="col-md-4"><label class="form-label">Transportadora</label><select name="transportadoraId" class="form-select" required><option value="">Selecione</option><option th:each="t:${transportadoras}" th:value="${t.id}" th:text="${t.nome}"></option></select></div></div><button class="btn btn-primary mt-3">Gerar ordem</button> <a href="/frete/despachos" class="btn btn-outline-secondary mt-3">Painel de ordens</a></form></div></main><footer th:replace="layout :: footer"></footer><div th:replace="layout :: scripts"></div></body></html>
