<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="layout :: head"></head><body><nav th:replace="layout :: menu"></nav><main class="container py-4"><div class="page-header"><h1 class="page-title">Tabela de contingência</h1><p class="page-subtitle">Valores locais usados quando a API externa estiver indisponível.</p></div><div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div><div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>
<div class="card p-4 mb-4"><form method="post" th:action="@{/frete/contingencia}" th:object="${faixa}"><div class="row g-3"><div class="col-md-3"><label class="form-label">Transportadora</label><select class="form-select" name="transportadoraId"><option value="">Sem preferência</option><option th:each="t:${transportadoras}" th:value="${t.id}" th:text="${t.nome}"></option></select></div><div class="col-md"><label class="form-label">CEP inicial</label><input class="form-control" th:field="*{cepInicio}" required></div><div class="col-md"><label class="form-label">CEP final</label><input class="form-control" th:field="*{cepFim}" required></div><div class="col-md"><label class="form-label">Peso mín.</label><input class="form-control" type="number" step=".001" th:field="*{pesoMinimo}" required></div><div class="col-md"><label class="form-label">Peso máx.</label><input class="form-control" type="number" step=".001" th:field="*{pesoMaximo}" required></div><div class="col-md"><label class="form-label">Valor</label><input class="form-control" type="number" step=".01" th:field="*{valorFrete}" required></div></div><button class="btn btn-primary mt-3">Salvar faixa</button></form></div>
<div class="card"><table class="table modern-table"><thead><tr><th>CEP</th><th>Peso</th><th>Transportadora</th><th>Valor</th><th>Status</th><th></th></tr></thead><tbody><tr th:each="f:${faixas}"><td th:text="${f.cepInicio}+' a '+${f.cepFim}"></td><td th:text="${f.pesoMinimo}+' a '+${f.pesoMaximo}+' kg'"></td><td th:text="${f.transportadora!=null?f.transportadora.nome:'Qualquer'}"></td><td th:text="'R$ '+${f.valorFrete}"></td><td><span class="badge" th:classappend="${f.ativo?'bg-success':'bg-secondary'}" th:text="${f.ativo?'Ativa':'Inativa'}"></span></td><td><form method="post" th:action="@{/frete/contingencia/{id}/alternar-status(id=${f.id})}"><button class="btn btn-sm btn-outline-secondary" th:text="${f.ativo?'Desativar':'Ativar'}"></button></form></td></tr></tbody></table></div></main><footer th:replace="layout :: footer"></footer><div th:replace="layout :: scripts"></div></body></html>
