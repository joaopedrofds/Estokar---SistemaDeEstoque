<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="layout :: head"></head><body><nav th:replace="layout :: menu"></nav><main class="container py-4"><div class="page-header"><h1 class="page-title">Transportadoras</h1><p class="page-subtitle">Parceiros habilitados para cotações e expedições.</p></div><div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div><div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>
<div class="card p-4 mb-4"><form method="post" th:action="@{/frete/transportadoras}" th:object="${transportadora}"><div class="row g-3"><div class="col-md-4"><label class="form-label">Nome</label><input class="form-control" th:field="*{nome}" required></div><div class="col-md-2"><label class="form-label">Prazo médio (dias)</label><input class="form-control" type="number" min="1" th:field="*{prazoMedioDias}" required></div><div class="col-md-4"><label class="form-label">Observações</label><input class="form-control" th:field="*{observacoes}"></div><div class="col-md-2 d-flex align-items-end"><button class="btn btn-primary w-100">Salvar</button></div></div></form></div>
<div class="card"><table class="table modern-table"><thead><tr><th>Nome</th><th>Prazo</th><th>Status</th><th>Ação</th></tr></thead><tbody><tr th:each="t:${transportadoras}"><td th:text="${t.nome}"></td><td th:text="${t.prazoMedioDias}+' dias'"></td><td><span class="badge" th:classappend="${t.ativo?'bg-success':'bg-secondary'}" th:text="${t.ativo?'Ativa':'Inativa'}"></span></td><td><form method="post" th:action="@{/frete/transportadoras/{id}/alternar-status(id=${t.id})}"><button class="btn btn-sm btn-outline-secondary" th:text="${t.ativo?'Desativar':'Ativar'}"></button></form></td></tr></tbody></table></div></main><footer th:replace="layout :: footer"></footer><div th:replace="layout :: scripts"></div></body></html>
