<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<div class="page-header">
    <div class="container">
        <h1 class="page-title"><i class="bi bi-truck me-3"></i>Cotação e Expedição de Fretes</h1>
        <p class="page-subtitle">Cotação, transportadoras, contingência e rastreio de despachos.</p>
    </div>
</div>

<div class="container py-4">
    <div class="row g-3">
        <div class="col-md-4">
            <a class="card text-decoration-none h-100" href="/frete/cotacao">
                <div class="card-body">
                    <h5 class="mb-2"><i class="bi bi-calculator me-2"></i>Cotação</h5>
                    <p class="text-muted mb-0">Calcule um novo frete em tempo real.</p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card text-decoration-none h-100" href="/frete/historico">
                <div class="card-body">
                    <h5 class="mb-2"><i class="bi bi-clock-history me-2"></i>Histórico</h5>
                    <div class="fs-3 fw-bold" th:text="${#lists.size(cotacoes)}">0</div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card text-decoration-none h-100" href="/frete/transportadoras">
                <div class="card-body">
                    <h5 class="mb-2"><i class="bi bi-truck-front-fill me-2"></i>Transportadoras</h5>
                    <div class="fs-3 fw-bold" th:text="${#lists.size(transportadoras)}">0</div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card text-decoration-none h-100" href="/frete/contingencia">
                <div class="card-body">
                    <h5 class="mb-2"><i class="bi bi-shield-check me-2"></i>Contingência</h5>
                    <div class="fs-3 fw-bold" th:text="${#lists.size(faixas)}">0</div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card text-decoration-none h-100" href="/frete/despacho">
                <div class="card-body">
                    <h5 class="mb-2"><i class="bi bi-box-arrow-up-right me-2"></i>Despacho</h5>
                    <p class="text-muted mb-0">Gere uma nova ordem de despacho.</p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card text-decoration-none h-100" href="/frete/despachos">
                <div class="card-body">
                    <h5 class="mb-2"><i class="bi bi-signpost-split-fill me-2"></i>Despachos</h5>
                    <div class="fs-3 fw-bold" th:text="${#lists.size(ordens)}">0</div>
                </div>
            </a>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
