<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="layout :: head"></head><body><nav th:replace="layout :: menu"></nav><main class="container py-4">
<div class="page-header"><h1 class="page-title">Cotação de frete</h1><p class="page-subtitle">Cache de 30 minutos, API parceira e contingência em uma única consulta.</p></div>
<div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div><div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>
<div th:if="${resultado}" class="alert" th:classappend="${resultado.origem=='API'?'alert-success':(resultado.origem=='CACHE'?'alert-info':'alert-warning')}"><strong th:text="'R$ '+${resultado.valor}"></strong> — origem: <span class="badge" th:classappend="${resultado.origem=='API'?'bg-success':(resultado.origem=='CACHE'?'bg-secondary':'bg-danger')}" th:text="${resultado.origem}"></span><span th:if="${resultado.transportadora}" th:text="' · '+${resultado.transportadora.nome}"></span></div>
<div class="card p-4"><form method="post" th:action="@{/frete/cotacao}" th:object="${parametros}"><div class="row g-3">
<div class="col-md-6"><label class="form-label">Pedido</label><select class="form-select" th:field="*{pedidoId}"><option value="">Sem vínculo</option><option th:each="p:${pedidos}" th:value="${p.id}" th:text="'Pedido #'+${p.id}+' — '+${p.cliente.nome}"></option></select></div>
<div class="col-md-6"><label class="form-label">Cliente</label><select class="form-select" th:field="*{clienteId}"><option value="">Opcional</option><option th:each="c:${clientes}" th:value="${c.id}" th:text="${c.nome}"></option></select></div>
<div class="col-md-3"><label class="form-label">CEP destino</label><input class="form-control" th:field="*{cepDestino}" maxlength="9" required></div><div class="col-md-3"><label class="form-label">Peso (kg)</label><input class="form-control" type="number" step="0.001" min="0.001" th:field="*{peso}" required></div>
<div class="col-md-2"><label class="form-label">Comprimento (cm)</label><input class="form-control" type="number" step="0.01" th:field="*{comprimento}" required></div><div class="col-md-2"><label class="form-label">Largura (cm)</label><input class="form-control" type="number" step="0.01" th:field="*{largura}" required></div><div class="col-md-2"><label class="form-label">Altura (cm)</label><input class="form-control" type="number" step="0.01" th:field="*{altura}" required></div>
</div><button class="btn btn-primary mt-3">Cotar agora</button> <a class="btn btn-outline-secondary mt-3" href="/frete/historico">Ver histórico</a></form></div></main><footer th:replace="layout :: footer"></footer><div th:replace="layout :: scripts"></div></body></html>
