<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="layout :: head"></head><body><nav th:replace="layout :: menu"></nav><main class="container py-4"><div class="page-header"><h1 class="page-title">Rastreio de despachos</h1><p class="page-subtitle">Ordens expedidas e situação atual das entregas.</p></div><div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div><div class="card"><div class="table-responsive"><table class="table modern-table"><thead><tr><th>Ordem</th><th>Pedido/cliente</th><th>Transportadora</th><th>Rastreio</th><th>Frete</th><th>Status</th><th>Previsão</th></tr></thead><tbody><tr th:each="o:${ordens}"><td th:text="'#'+${o.id}"></td><td th:text="'#'+${o.pedido.id}+' · '+${o.pedido.cliente.nome}"></td><td th:text="${o.transportadora.nome}"></td><td th:text="${o.codigoRastreio}"></td><td th:text="'R$ '+${o.valorFrete}"></td><td><span class="badge" th:classappend="${o.status=='ENTREGUE'?'bg-success':(o.status=='CANCELADO'?'bg-danger':'bg-secondary')}" th:text="${o.status}"></span></td><td th:text="${o.dataEntregaPrevista!=null?#temporals.format(o.dataEntregaPrevista,'dd/MM/yyyy'):'-'}"></td></tr><tr th:if="${#lists.isEmpty(ordens)}"><td colspan="7" class="text-center text-muted">Nenhuma ordem de despacho gerada.</td></tr></tbody></table></div></div></main><footer th:replace="layout :: footer"></footer><div th:replace="layout :: scripts"></div></body></html>
