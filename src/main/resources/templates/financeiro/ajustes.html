<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<div class="page-header">
    <div class="container">
        <h1 class="page-title"><i class="bi bi-pencil-square me-3"></i>Ajustes Manuais</h1>
        <p class="page-subtitle">Lançamentos de correção destacados nos relatórios, separados do resultado operacional.</p>
    </div>
</div>

<div class="container py-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Novo lançamento</h5></div>
                <div class="card-body">
                    <form th:action="@{/financeiro/ajustes/salvar}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="categoriaId">Categoria</label>
                            <select id="categoriaId" name="categoriaId" class="form-select" required>
                                <option value="">Selecione...</option>
                                <option th:each="cat : ${categorias}" th:value="${cat.id}"
                                        th:text="${cat.nome + ' (' + cat.tipo + ')'}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="dataLancamento">Data</label>
                            <input type="date" id="dataLancamento" name="dataLancamento" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="valor">Valor (R$)</label>
                            <input type="number" step="0.01" min="0.01" id="valor" name="valor" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="descricao">Descrição / motivo</label>
                            <textarea id="descricao" name="descricao" class="form-control" rows="3" required
                                      placeholder="Ex: estorno manual, correção de valor..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Registrar ajuste</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Histórico de ajustes</h5></div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover modern-table mb-0">
                            <thead>
                            <tr>
                                <th>Data</th>
                                <th>Categoria</th>
                                <th>Valor</th>
                                <th>Descrição</th>
                                <th>Usuário</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${ajustes.empty}">
                                <td colspan="5" class="text-center py-4 text-muted">Nenhum ajuste registrado.</td>
                            </tr>
                            <tr th:each="aj : ${ajustes}" class="table-warning">
                                <td th:text="${#dates.format(aj.dataLancamento, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <span th:text="${aj.categoriaNome}"></span>
                                    <small class="text-muted d-block" th:text="${aj.categoriaTipo}"></small>
                                </td>
                                <td th:text="${'R$ ' + #numbers.formatDecimal(aj.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                                <td th:text="${aj.descricao}"></td>
                                <td th:text="${aj.username}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
