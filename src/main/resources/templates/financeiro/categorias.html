<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<div class="page-header">
    <div class="container">
        <h1 class="page-title"><i class="bi bi-tags me-3"></i>Categorias Financeiras</h1>
        <p class="page-subtitle">Plano de contas simplificado para classificação de receitas e despesas.</p>
    </div>
</div>

<div class="container py-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0" th:text="${categoriaForm.id == 0 ? 'Nova Categoria' : 'Editar Categoria'}"></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/financeiro/categorias/salvar}" method="post">
                        <input type="hidden" name="id" th:value="${categoriaForm.id}">
                        <div class="mb-3">
                            <label class="form-label" for="nome">Nome</label>
                            <input id="nome" name="nome" class="form-control" th:value="${categoriaForm.nome}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="tipo">Tipo</label>
                            <select id="tipo" name="tipo" class="form-select" required>
                                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"
                                        th:selected="${t == categoriaForm.tipo}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="origemSistema">Origem no sistema</label>
                            <select id="origemSistema" name="origemSistema" class="form-select">
                                <option value="">Manual / sem origem automática</option>
                                <option th:each="o : ${origens}" th:value="${o}" th:text="${o}"
                                        th:selected="${o == categoriaForm.origemSistema}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="descricao">Descrição</label>
                            <textarea id="descricao" name="descricao" class="form-control" rows="2"
                                      th:text="${categoriaForm.descricao}"></textarea>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="ativo" name="ativo"
                                   th:checked="${categoriaForm.ativo}">
                            <label class="form-check-label" for="ativo">Ativa</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Salvar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover modern-table mb-0">
                            <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Tipo</th>
                                <th>Origem</th>
                                <th>Status</th>
                                <th class="text-center">Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="cat : ${categorias}">
                                <td th:text="${cat.nome}"></td>
                                <td><span class="badge bg-secondary" th:text="${cat.tipo}"></span></td>
                                <td th:text="${cat.origemSistema != null ? cat.origemSistema : '-'}"></td>
                                <td>
                                    <span th:if="${cat.ativo}" class="status-badge status-active">Ativa</span>
                                    <span th:unless="${cat.ativo}" class="status-badge status-inactive">Inativa</span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/financeiro/categorias(editarId=${cat.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:if="${cat.ativo}" th:href="@{/financeiro/categorias/inativar/{id}(id=${cat.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Inativar categoria?')">
                                        <i class="bi bi-x-circle"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
