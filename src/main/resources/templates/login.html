<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Estokar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Inter, Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }

        .role-list {
            font-size: 0.9rem;
            margin-bottom: 0;
            color: #4f4f4f;
        }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <h2 class="mb-1 text-center">Acesso ao Estokar</h2>
    <p class="text-muted text-center mb-4">Entre com seu usuário para continuar.</p>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        Usuário ou senha inválidos.
    </div>

    <div th:if="${param.logout}" class="alert alert-success" role="alert">
        Sessão encerrada com sucesso.
    </div>

    <form method="post" th:action="@{/login}">
        <div class="mb-3">
            <label for="username" class="form-label">Usuário</label>
            <input id="username" name="username" type="text" class="form-control" required autofocus>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Senha</label>
            <input id="password" name="password" type="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <hr>

    <p class="fw-semibold mb-2">Perfis para demonstração:</p>
    <ul class="role-list">
        <li><strong>Diretor:</strong> usuário <code>diretor</code> | senha <code>Diretor@123</code></li>
        <li><strong>Auxiliar:</strong> usuário <code>auxiliar</code> | senha <code>Auxiliar@123</code></li>
        <li><strong>Estoquista:</strong> usuário <code>estoquista</code> | senha <code>Estoque@123</code></li>
    </ul>
</div>
</body>
</html>
