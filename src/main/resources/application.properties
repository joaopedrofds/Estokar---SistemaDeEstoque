spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/studiomuda?useSSL=false&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:estokar}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Flyway versiona o schema MySQL. O banco existente (criado por setup_database.sql
# + scripts V8-V12) é adotado como baseline na versão 12; apenas migrações > 12
# (V13+) são aplicadas. Hibernate (ddl-auto=update) continua reconciliando entidades.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=12
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
