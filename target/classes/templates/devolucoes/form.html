<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<section class="page-header">
    <div class="container">
        <h1 class="page-title"><i class="bi bi-arrow-return-left me-3"></i>Solicitar Devolução</h1>
        <p class="page-subtitle">Pedido #<span th:text="${pedido.id}"></span> — <span th:text="${pedido.clienteNome}"></span></p>
    </div>
</section>

<div class="container my-4">
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <form th:action="@{/devolucoes/salvar}" method="post">
        <input type="hidden" name="pedidoId" th:value="${pedido.id}">

        <div class="card mb-4">
            <div class="card-header"><h5 class="mb-0">Itens do Pedido</h5></div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Qtd. Original</th>
                                <th>Qtd. Devolver</th>
                                <th>Valor Unit.</th>
                                <th>Condição</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item, iterStat : ${itensPedido}">
                                <td th:text="${item.produtoNome}"></td>
                                <td th:text="${item.quantidade}"></td>
                                <td>
                                    <input type="hidden" name="produtoIds" th:value="${item.produtoId}">
                                    <input type="hidden" name="valoresUnitarios" th:value="${item.produtoValor}">
                                    <input type="number" class="form-control form-control-sm" name="quantidades"
                                           min="0" th:max="${item.quantidade}" value="0" style="width:80px">
                                </td>
                                <td th:text="${#numbers.formatCurrency(item.produtoValor)}"></td>
                                <td>
                                    <select class="form-select form-select-sm" name="condicoes" style="width:130px">
                                        <option value="BOM">Bom estado</option>
                                        <option value="DANIFICADO">Danificado</option>
                                        <option value="DEFEITUOSO">Defeituoso</option>
                                    </select>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header"><h5 class="mb-0">Dados da Devolução</h5></div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Motivo da Devolução *</label>
                        <textarea class="form-control" name="motivo" rows="3" required
                                  placeholder="Descreva o motivo da devolução..."></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo de Restituição *</label>
                        <select class="form-select" name="tipoRestituicao" required>
                            <option value="CREDITO_LOJA">💳 Crédito na Loja (90 dias)</option>
                            <option value="TROCA">🔄 Troca de Produto</option>
                            <option value="ESTORNO">💰 Estorno Financeiro</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-send me-2"></i>Solicitar Devolução
            </button>
            <a th:href="@{/pedidos/itens/{id}(id=${pedido.id})}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Cancelar
            </a>
        </div>
    </form>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
