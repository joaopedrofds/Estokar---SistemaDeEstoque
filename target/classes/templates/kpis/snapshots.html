<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
    <div th:replace="layout :: menu"></div>
    
    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="page-title">
                        <i class="bi bi-journal-text me-3"></i>
                        Snapshots de KPIs
                    </h1>
                    <p class="page-subtitle">Histórico e auditoria de apuração imutável dos indicadores operacionais</p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="/kpis" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Voltar aos KPIs
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-gradient fw-bold">Registro Geral de Snapshots Persistidos</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover modern-table mb-0 align-middle">
                        <thead>
                            <tr>
                                <th>Snapshot ID</th>
                                <th>Indicador</th>
                                <th>Período Apurado</th>
                                <th class="text-end">Valor Calculado</th>
                                <th class="text-center">Data Execução</th>
                                <th>Executado Por</th>
                                <th>Histórico / Rastreio</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="snap : ${snapshots}">
                                <td th:text="${'#' + snap.id}" class="fw-semibold text-muted">#1</td>
                                <td>
                                    <div class="fw-bold text-dark" th:text="${snap.indicadorNome}">Ticket Médio</div>
                                    <code><small th:text="${snap.indicadorCodigo}"></small></code>
                                </td>
                                <td>
                                    <span th:text="${#temporals.format(snap.periodoInicio, 'dd/MM/yyyy')}"></span>
                                    <span> a </span>
                                    <span th:text="${#temporals.format(snap.periodoFim, 'dd/MM/yyyy')}"></span>
                                </td>
                                <td class="text-end fw-bold text-dark">
                                    <span th:text="${snap.indicadorCodigo == 'TICKET_MEDIO' ? 'R$ ' + #numbers.formatDecimal(snap.valorCalculado, 1, 'POINT', 2, 'COMMA') : (snap.indicadorCodigo == 'TAXA_CANCELAMENTO' ? #numbers.formatDecimal(snap.valorCalculado, 1, 'POINT', 2, 'COMMA') + '%' : #numbers.formatDecimal(snap.valorCalculado, 1, 0))}"></span>
                                </td>
                                <td class="text-center text-muted">
                                    <span th:text="${#temporals.format(snap.dataExecucao, 'dd/MM/yyyy HH:mm')}"></span>
                                </td>
                                <td>
                                    <span class="badge bg-light text-dark border p-2" th:text="${snap.executadoPor}">admin</span>
                                </td>
                                <td class="text-muted fs-6" th:text="${snap.detalheRastreio}">Apurado pelo sistema</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
