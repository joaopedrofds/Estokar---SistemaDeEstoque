<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
    <div th:replace="layout :: menu"></div>

    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="page-title">
                        <i class="bi bi-file-earmark-text-fill me-3"></i>
                        Auditoria do Cancelamento
                    </h1>
                    <p class="page-subtitle">Pedido #<span th:text="${pedido.id}"></span></p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="/pedidos/cancelamentos" class="btn btn-primary btn-lg">
                        <i class="bi bi-arrow-left-circle me-2"></i>
                        Cancelamentos
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card h-100">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">Governança</h5>
                    </div>
                    <div class="card-body">
                        <p><strong>Status:</strong>
                            <span class="badge bg-warning text-dark" th:if="${pedido.status == 'CANCELAMENTO_PENDENTE_APROVACAO'}">Aguardando aprovação</span>
                            <span class="badge bg-danger" th:if="${pedido.status == 'CANCELADO'}">Cancelado</span>
                        </p>
                        <p><strong>Solicitante:</strong> <span th:text="${pedido.cancelamentoSolicitanteNome != null ? pedido.cancelamentoSolicitanteNome : 'Não informado'}"></span></p>
                        <p><strong>Data solicitação:</strong> <span th:text="${pedido.dataCancelamento != null ? #dates.format(pedido.dataCancelamento, 'dd/MM/yyyy HH:mm') : 'Não registrada'}"></span></p>
                        <p><strong>Aprovador:</strong> <span th:text="${pedido.cancelamentoAprovadorNome != null ? pedido.cancelamentoAprovadorNome : 'Sem aprovação'}"></span></p>
                        <p><strong>Data aprovação:</strong> <span th:text="${pedido.dataAprovacaoCancelamento != null ? #dates.format(pedido.dataAprovacaoCancelamento, 'dd/MM/yyyy HH:mm') : 'Não registrada'}"></span></p>
                        <hr>
                        <p class="mb-1"><strong>Justificativa:</strong></p>
                        <p class="text-muted" th:text="${pedido.justificativaCancelamento != null ? pedido.justificativaCancelamento : 'Não registrada'}"></p>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card h-100">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Itens Estornados</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th>Produto</th>
                                        <th>Quantidade</th>
                                        <th>Saldo atual</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${pedido.itens}">
                                        <td th:text="${item.produto.nome}"></td>
                                        <td th:text="${item.quantidade}"></td>
                                        <td th:text="${item.produto.quantidade}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
