<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<div class="page-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="page-title">
                    <i class="bi bi-grid-3x3-gap-fill me-3"></i>
                    Matriz de Permissões
                </h1>
                <p class="page-subtitle">Defina leitura, escrita e aprovação para cada perfil.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="/acesso/perfis" class="btn btn-outline-light btn-lg">
                    <i class="bi bi-people-fill me-2"></i>
                    Gerenciar Perfis
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <div th:if="${perfis == null || perfis.empty}" class="alert alert-warning">
        Cadastre um perfil ativo para configurar a matriz de permissões.
    </div>

    <div th:if="${perfis != null && !perfis.empty}" class="card">
        <div class="card-body">
            <form method="get" action="/acesso/permissoes" class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Perfil</label>
                    <select name="perfilId" class="form-select" onchange="this.form.submit()">
                        <option th:each="perfil : ${perfis}"
                                th:value="${perfil.id}"
                                th:text="${perfil.nome}"
                                th:selected="${perfil.id == perfilSelecionadoId}"></option>
                    </select>
                </div>
            </form>

            <form th:action="@{/acesso/permissoes/salvar}" method="post">
                <input type="hidden" name="perfilId" th:value="${perfilSelecionadoId}">

                <div class="table-responsive">
                    <table class="table table-hover modern-table">
                        <thead>
                        <tr>
                            <th>Recurso</th>
                            <th class="text-center">Leitura</th>
                            <th class="text-center">Escrita</th>
                            <th class="text-center">Aprovação</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="recurso : ${recursos}">
                            <td>
                                <div class="fw-semibold" th:text="${recurso.name()}"></div>
                                <small class="text-muted" th:text="${recurso.descricao}"></small>
                            </td>
                            <td class="text-center" th:each="operacao : ${operacoes}">
                                <input type="checkbox"
                                       class="form-check-input"
                                       th:name="${'perm_' + recurso.name() + '_' + operacao.name()}"
                                       th:checked="${permissoesAtivas[recurso.name()] != null and permissoesAtivas[recurso.name()].contains(operacao.name())}">
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>Salvar matriz
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
