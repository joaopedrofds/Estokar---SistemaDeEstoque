<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: menu"></div>

<div class="page-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="page-title">
                    <i class="bi bi-person-lock me-3"></i>
                    Usuários e Vínculos
                </h1>
                <p class="page-subtitle">Controle logins, ativação e associação de perfis.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="/acesso/usuarios/novo" class="btn btn-primary btn-lg">
                    <i class="bi bi-person-plus-fill me-2"></i>
                    Novo Usuário
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover modern-table mb-0">
                    <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Nome</th>
                        <th>Perfis</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${usuarios.empty}">
                        <td colspan="5" class="text-center py-4 text-muted">
                            Nenhum usuário cadastrado.
                        </td>
                    </tr>
                    <tr th:each="usuario : ${usuarios}">
                        <td>
                            <code th:text="${usuario.username}"></code>
                        </td>
                        <td th:text="${usuario.nome}"></td>
                        <td>
                            <span th:if="${usuario.perfilNomes.empty}" class="text-muted">Sem perfis</span>
                            <span th:each="perfil : ${usuario.perfilNomes}" class="badge bg-secondary me-1"
                                  th:text="${perfil}"></span>
                        </td>
                        <td>
                                <span th:if="${usuario.ativo}" class="status-badge status-active">
                                    <i class="bi bi-check-circle-fill me-1"></i>Ativo
                                </span>
                            <span th:unless="${usuario.ativo}" class="status-badge status-inactive">
                                    <i class="bi bi-x-circle-fill me-1"></i>Inativo
                                </span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/acesso/usuarios/editar/{id}(id=${usuario.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:if="${usuario.ativo}"
                               th:href="@{/acesso/usuarios/inativar/{id}(id=${usuario.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Deseja inativar este usuário?')">
                                <i class="bi bi-person-x"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
